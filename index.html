<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metronome</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  .mirror-panel {
    flex: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #111;
    position: relative;
  }
  .mirror-panel video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  .mirror-panel .cam-msg {
    color: #555;
    font-size: 18px;
    position: absolute;
  }
  .cam-toggle {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 10;
    background: rgba(0,0,0,0.5);
    color: #e0e0e0;
    border: 1px solid #444;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    flex: none;
  }
  .cam-toggle:hover { background: rgba(0,0,0,0.7); }
  .metronome-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 32px;
    min-width: 320px;
    max-width: 420px;
  }
  .container {
    background: #16213e;
    border-radius: 16px;
    padding: 36px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  h1 { text-align: center; margin-bottom: 24px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; }
  .beat-display {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .beat-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #2a2a4a;
    transition: background 0.05s;
  }
  .beat-dot.active { background: #e94560; box-shadow: 0 0 16px #e94560; }
  .beat-dot.accent { background: #f5c518; box-shadow: 0 0 16px #f5c518; }
  .bpm-section { text-align: center; margin-bottom: 24px; }
  .bpm-value {
    font-size: 64px; font-weight: 200;
    cursor: text;
  }
  .bpm-value input {
    width: 140px; font-size: 64px; font-weight: 200;
    background: transparent; border: none; border-bottom: 2px solid #e94560;
    color: #e0e0e0; text-align: center; outline: none;
    -moz-appearance: textfield;
  }
  .bpm-value input::-webkit-outer-spin-button,
  .bpm-value input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .bpm-label { font-size: 14px; color: #888; letter-spacing: 2px; }
  input[type="range"] {
    -webkit-appearance: none; width: 100%; height: 4px;
    background: #2a2a4a; border-radius: 2px; outline: none; margin: 16px 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px;
    background: #e94560; border-radius: 50%; cursor: pointer;
  }
  .controls { display: flex; gap: 10px; margin-bottom: 20px; }
  button {
    flex: 1; padding: 12px; border: none; border-radius: 8px;
    font-size: 15px; cursor: pointer; transition: background 0.2s;
    font-family: inherit;
  }
  .btn-start { background: #e94560; color: white; }
  .btn-start:hover { background: #c73650; }
  .btn-start.running { background: #4a9e4a; }
  .btn-start.running:hover { background: #3d833d; }
  .btn-tap { background: #2a2a4a; color: #e0e0e0; }
  .btn-tap:hover { background: #3a3a5a; }
  .row { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
  .row label { font-size: 13px; color: #888; min-width: 80px; }
  select {
    flex: 1; padding: 8px 12px; border-radius: 6px; border: none;
    background: #2a2a4a; color: #e0e0e0; font-size: 14px;
    font-family: inherit; cursor: pointer; outline: none;
  }
  .hint-row { display: flex; justify-content: center; align-items: center; margin-top: 16px; position: relative; }
  .elapsed { font-size: 13px; color: #666; position: absolute; left: 0; }
  .hint { font-size: 12px; color: #555; }
  .timer-section {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #2a2a4a;
    text-align: center;
  }
  .timer-display {
    font-size: 36px;
    font-weight: 200;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .timer-controls { display: flex; gap: 10px; margin-bottom: 12px; }
  .btn-timer { background: #2a2a4a; color: #e0e0e0; }
  .btn-timer:hover { background: #3a3a5a; }
  .btn-timer.running { background: #e94560; color: white; }
  .btn-timer.running:hover { background: #c73650; }
  .timer-done { color: #e94560; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>

<div class="mirror-panel">
  <video id="webcam" autoplay playsinline muted></video>
  <span class="cam-msg" id="camMsg">Click "Start Camera" to begin</span>
  <button class="cam-toggle" id="camToggle">Start Camera</button>
</div>

<div class="metronome-panel">
  <div class="container">
    <h1>Metronome</h1>
    <div class="beat-display" id="beatDisplay"></div>
    <div class="bpm-section">
      <div class="bpm-value"><input type="number" id="bpmInput" value="120" min="20" max="300"></div>
      <div class="bpm-label">BPM</div>
    </div>
    <input type="range" id="bpmSlider" min="20" max="300" value="120">
    <div class="controls">
      <button class="btn-start" id="startBtn">Start</button>
      <button class="btn-tap" id="tapBtn">Tap Tempo</button>
    </div>
    <div class="row">
      <label>Time Sig</label>
      <select id="timeSig">
        <option value="4">4/4</option>
        <option value="3">3/4</option>
        <option value="6">6/8</option>
        <option value="2">2/4</option>
        <option value="5">5/4</option>
        <option value="7">7/8</option>
      </select>
    </div>
    <div class="row">
      <label>Preset</label>
      <select id="presetSelect">
        <option value="">— Select —</option>
        <option value="50">Largo (50)</option>
        <option value="72">Adagio (72)</option>
        <option value="92">Andante (92)</option>
        <option value="112">Moderato (112)</option>
        <option value="132">Allegro (132)</option>
        <option value="160">Vivace (160)</option>
        <option value="184">Presto (184)</option>
      </select>
    </div>
    <div class="hint-row">
      <span class="elapsed" id="elapsed"></span>
      <span class="hint">Space to start/stop</span>
    </div>
    <div class="timer-section">
      <h1>Timer</h1>
      <div class="timer-display" id="timerDisplay">30:00</div>
      <div class="row">
        <label>Duration</label>
        <select id="timerPreset">
          <option value="1">1 min</option>
          <option value="5">5 min</option>
          <option value="10">10 min</option>
          <option value="15">15 min</option>
          <option value="20">20 min</option>
          <option value="25">25 min</option>
          <option value="30" selected>30 min</option>
          <option value="40">40 min</option>
          <option value="45">45 min</option>
          <option value="60">60 min</option>
          <option value="90">90 min</option>
        </select>
      </div>
      <div class="timer-controls">
        <button class="btn-timer" id="timerBtn">Start Timer</button>
        <button class="btn-timer" id="timerReset">Reset</button>
      </div>
    </div>
  </div>
</div>

<script>
  // Webcam setup
  const video = document.getElementById('webcam');
  const camMsg = document.getElementById('camMsg');
  const camToggle = document.getElementById('camToggle');
  let camStream = null;
  let camOn = false;

  function startCamera() {
    const constraints = { video: true, audio: false };
    navigator.mediaDevices.getUserMedia(constraints)
      .then(stream => {
        camStream = stream;
        video.srcObject = stream;
        video.setAttribute('autoplay', '');
        video.setAttribute('playsinline', '');
        video.play().catch(() => {});
        camMsg.style.display = 'none';
        video.style.display = '';
        camToggle.textContent = 'Stop Camera';
        camOn = true;
      })
      .catch(() => {
        camMsg.textContent = 'Camera not available';
        camMsg.style.display = '';
      });
  }

  function stopCamera() {
    if (camStream) {
      camStream.getTracks().forEach(t => t.stop());
      camStream = null;
    }
    video.srcObject = null;
    video.style.display = 'none';
    camMsg.textContent = 'Camera is off';
    camMsg.style.display = '';
    camToggle.textContent = 'Start Camera';
    camOn = false;
  }

  camToggle.addEventListener('click', () => {
    if (camOn) stopCamera(); else startCamera();
  });

  // Metronome
  let audioCtx = null;
  let bpm = 120;
  let beatsPerMeasure = 4;
  let isRunning = false;
  let currentBeat = 0;
  let nextNoteTime = 0;
  let timerID = null;
  const scheduleAheadTime = 0.1;
  const lookahead = 25;

  const bpmInput = document.getElementById('bpmInput');
  const bpmSlider = document.getElementById('bpmSlider');
  const startBtn = document.getElementById('startBtn');
  const tapBtn = document.getElementById('tapBtn');
  const timeSig = document.getElementById('timeSig');
  const presetSelect = document.getElementById('presetSelect');
  const beatDisplay = document.getElementById('beatDisplay');
  const elapsedEl = document.getElementById('elapsed');
  let elapsedInterval = null;
  let elapsedStart = 0;

  function buildDots() {
    beatDisplay.innerHTML = '';
    for (let i = 0; i < beatsPerMeasure; i++) {
      const dot = document.createElement('div');
      dot.className = 'beat-dot';
      beatDisplay.appendChild(dot);
    }
  }
  buildDots();

  function setBpm(v) {
    bpm = Math.min(300, Math.max(20, Math.round(v)));
    bpmInput.value = bpm;
    bpmSlider.value = bpm;
  }

  bpmInput.addEventListener('change', () => setBpm(Number(bpmInput.value)));
  bpmSlider.addEventListener('input', () => setBpm(Number(bpmSlider.value)));

  timeSig.addEventListener('change', () => {
    beatsPerMeasure = Number(timeSig.value);
    currentBeat = 0;
    buildDots();
  });

  presetSelect.addEventListener('change', () => {
    if (presetSelect.value) setBpm(Number(presetSelect.value));
    presetSelect.value = '';
  });

  function playClick(time, accent) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = accent ? 1500 : 1000;
    gain.gain.setValueAtTime(accent ? 1 : 0.5, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
    osc.start(time);
    osc.stop(time + 0.05);
  }

  function flashBeat(beat, time) {
    const delay = (time - audioCtx.currentTime) * 1000;
    setTimeout(() => {
      const dots = beatDisplay.querySelectorAll('.beat-dot');
      dots.forEach(d => d.classList.remove('active', 'accent'));
      if (dots[beat]) {
        dots[beat].classList.add(beat === 0 ? 'accent' : 'active');
        setTimeout(() => dots[beat]?.classList.remove('active', 'accent'), 100);
      }
    }, Math.max(0, delay));
  }

  function scheduler() {
    while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
      const accent = currentBeat === 0;
      playClick(nextNoteTime, accent);
      flashBeat(currentBeat, nextNoteTime);
      nextNoteTime += 60.0 / bpm;
      currentBeat = (currentBeat + 1) % beatsPerMeasure;
    }
  }

  function start() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    isRunning = true;
    currentBeat = 0;
    nextNoteTime = audioCtx.currentTime;
    timerID = setInterval(scheduler, lookahead);
    startBtn.textContent = 'Stop';
    startBtn.classList.add('running');
    elapsedStart = Date.now();
    elapsedEl.textContent = '00:00';
    elapsedInterval = setInterval(() => {
      const s = Math.floor((Date.now() - elapsedStart) / 1000);
      const m = Math.floor(s / 60);
      const sec = s % 60;
      elapsedEl.textContent = String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
    }, 1000);
  }

  function stop() {
    isRunning = false;
    clearInterval(timerID);
    startBtn.textContent = 'Start';
    startBtn.classList.remove('running');
    beatDisplay.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active', 'accent'));
    clearInterval(elapsedInterval);
    elapsedEl.textContent = '';
  }

  startBtn.addEventListener('click', () => isRunning ? stop() : start());

  // Tap tempo
  let tapTimes = [];
  tapBtn.addEventListener('click', () => {
    const now = performance.now();
    tapTimes.push(now);
    tapTimes = tapTimes.filter(t => now - t < 3000);
    if (tapTimes.length > 1) {
      const intervals = [];
      for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i - 1]);
      const avg = intervals.reduce((a, b) => a + b) / intervals.length;
      setBpm(60000 / avg);
    }
  });

  // Spacebar
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
      e.preventDefault();
      isRunning ? stop() : start();
    }
  });

  // Practice timer
  const timerDisplay = document.getElementById('timerDisplay');
  const timerBtn = document.getElementById('timerBtn');
  const timerReset = document.getElementById('timerReset');
  const timerPreset = document.getElementById('timerPreset');
  let timerSeconds = 30 * 60;
  let timerRemaining = timerSeconds;
  let timerInterval = null;
  let timerRunning = false;

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  }

  function updateTimerDisplay() {
    timerDisplay.textContent = formatTime(timerRemaining);
    timerDisplay.classList.toggle('timer-done', timerRemaining === 0);
  }

  timerPreset.addEventListener('change', () => {
    timerSeconds = Number(timerPreset.value) * 60;
    timerRemaining = timerSeconds;
    stopTimer();
    updateTimerDisplay();
  });

  function startTimer() {
    timerRunning = true;
    timerBtn.textContent = 'Pause Timer';
    timerBtn.classList.add('running');
    timerInterval = setInterval(() => {
      if (timerRemaining > 0) {
        timerRemaining--;
        updateTimerDisplay();
        if (timerRemaining === 0) {
          stopTimer();
          playTimerAlert();
        }
      }
    }, 1000);
  }

  function stopTimer() {
    timerRunning = false;
    clearInterval(timerInterval);
    timerBtn.textContent = timerRemaining === 0 ? 'Done' : 'Start Timer';
    timerBtn.classList.remove('running');
  }

  let alertInterval = null;
  function playAlertChime() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    [0, 0.3, 0.6].forEach((offset, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = [880, 660, 440][i];
      gain.gain.setValueAtTime(0.5, now + offset);
      gain.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.25);
      osc.start(now + offset);
      osc.stop(now + offset + 0.25);
    });
  }
  function playTimerAlert() {
    playAlertChime();
    alertInterval = setInterval(playAlertChime, 1500);
  }
  function stopTimerAlert() {
    if (alertInterval) { clearInterval(alertInterval); alertInterval = null; }
  }

  timerBtn.addEventListener('click', () => {
    if (timerRemaining === 0) { stopTimerAlert(); timerReset.click(); return; }
    timerRunning ? stopTimer() : startTimer();
  });

  timerReset.addEventListener('click', () => {
    stopTimer();
    stopTimerAlert();
    timerRemaining = timerSeconds;
    updateTimerDisplay();
  });
</script>
</body>
</html>
