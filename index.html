<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sitting Timer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  body.warning { animation: flash 0.5s ease-in-out infinite alternate; }
  @keyframes flash {
    from { background: #1a1a2e; }
    to { background: #8b0000; }
  }
  #camera-preview {
    position: fixed;
    top: 12px;
    right: 12px;
    width: 160px;
    height: 120px;
    border-radius: 8px;
    border: 2px solid #333;
    object-fit: cover;
    z-index: 10;
    background: #000;
  }
  #status {
    font-size: 1.2rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 12px;
  }
  #status.sitting { color: #4caf50; }
  #status.away { color: #888; }
  #status.warn { color: #ff1744; font-weight: bold; }
  #status.stopped { color: #666; }
  #timer {
    font-size: 6rem;
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
  }
  #threshold-display {
    margin-top: 8px;
    font-size: 0.95rem;
    color: #666;
  }
  #controls {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  #controls button {
    background: #16213e;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 0.95rem;
    cursor: pointer;
  }
  #controls button:hover { background: #1a2744; border-color: #555; }
  #controls button.active { border-color: #4caf50; color: #4caf50; }
  #mute-btn.muted { border-color: #ff9800; color: #ff9800; }
  #settings-btn {
    position: fixed;
    top: 12px;
    left: 12px;
    background: none;
    border: none;
    color: #888;
    font-size: 1.5rem;
    cursor: pointer;
    z-index: 10;
  }
  #settings-btn:hover { color: #e0e0e0; }
  #settings-panel {
    display: none;
    position: fixed;
    top: 50px;
    left: 12px;
    background: #16213e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 16px;
    z-index: 20;
    min-width: 240px;
  }
  #settings-panel.open { display: block; }
  #settings-panel label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #aaa; }
  #threshold-range { width: 100%; margin-bottom: 12px; }
  #threshold-val { font-weight: bold; color: #e0e0e0; }
  .quick-presets { display: flex; gap: 6px; }
  .quick-presets button {
    flex: 1;
    background: #1a2744;
    border: 1px solid #333;
    color: #aaa;
    padding: 6px 0;
    border-radius: 4px;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .quick-presets button:hover { border-color: #555; color: #e0e0e0; }
  .quick-presets button.selected { border-color: #4caf50; color: #4caf50; }
  #loading {
    position: fixed;
    inset: 0;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    font-size: 1.2rem;
    color: #888;
  }
</style>
</head>
<body>
<div id="loading">Loading model…</div>
<video id="camera-preview" autoplay playsinline muted></video>
<button id="settings-btn">⚙</button>
<div id="settings-panel">
  <label>Sitting threshold: <span id="threshold-val">20</span> min</label>
  <input type="range" id="threshold-range" min="1" max="60" value="20">
  <div class="quick-presets">
    <button data-min="10">10m</button>
    <button data-min="15">15m</button>
    <button data-min="20" class="selected">20m</button>
    <button data-min="30">30m</button>
  </div>
</div>
<div id="status" class="stopped">Stopped</div>
<div id="timer">00:00</div>
<div id="threshold-display">Threshold: 20 min</div>
<div id="controls">
  <button id="start-btn">Start</button>
  <button id="mute-btn">🔊 Sound On</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
<script>
(async function() {
  const video = document.getElementById('camera-preview');
  const timerEl = document.getElementById('timer');
  const statusEl = document.getElementById('status');
  const settingsBtn = document.getElementById('settings-btn');
  const settingsPanel = document.getElementById('settings-panel');
  const thresholdRange = document.getElementById('threshold-range');
  const thresholdVal = document.getElementById('threshold-val');
  const thresholdDisplay = document.getElementById('threshold-display');
  const loadingEl = document.getElementById('loading');
  const startBtn = document.getElementById('start-btn');
  const muteBtn = document.getElementById('mute-btn');
  const presetBtns = document.querySelectorAll('.quick-presets button');

  let thresholdSec = 20 * 60;
  let sittingSec = 0;
  let personPresent = false;
  let lastSeenTime = 0;
  const GRACE_MS = 5000;
  let isWarning = false;
  let audioCtx = null;
  let warnInterval = null;
  let running = false;
  let muted = false;
  let detectTimeout = null;
  let tickInterval = null;

  function updateThreshold(minutes) {
    thresholdSec = minutes * 60;
    thresholdVal.textContent = minutes;
    thresholdRange.value = minutes;
    thresholdDisplay.textContent = `Threshold: ${minutes} min`;
    presetBtns.forEach(b => b.classList.toggle('selected', parseInt(b.dataset.min) === minutes));
  }

  // Settings
  settingsBtn.addEventListener('click', () => settingsPanel.classList.toggle('open'));
  thresholdRange.addEventListener('input', () => updateThreshold(parseInt(thresholdRange.value)));
  presetBtns.forEach(b => b.addEventListener('click', () => updateThreshold(parseInt(b.dataset.min))));

  // Mute
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    muteBtn.textContent = muted ? '🔇 Muted' : '🔊 Sound On';
    muteBtn.classList.toggle('muted', muted);
    if (muted && warnInterval) {
      clearInterval(warnInterval);
      warnInterval = null;
    }
    if (!muted && isWarning) {
      playTone();
      warnInterval = setInterval(playTone, 3000);
    }
  });

  // Start / Stop
  startBtn.addEventListener('click', () => {
    if (!running) {
      running = true;
      startBtn.textContent = 'Stop';
      startBtn.classList.add('active');
      sittingSec = 0;
      isWarning = false;
      document.body.classList.remove('warning');
      detect();
      tickInterval = setInterval(tick, 1000);
    } else {
      stop();
    }
  });

  function stop() {
    running = false;
    startBtn.textContent = 'Start';
    startBtn.classList.remove('active');
    personPresent = false;
    isWarning = false;
    sittingSec = 0;
    document.body.classList.remove('warning');
    if (warnInterval) { clearInterval(warnInterval); warnInterval = null; }
    if (detectTimeout) { clearTimeout(detectTimeout); detectTimeout = null; }
    if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
    statusEl.textContent = 'Stopped';
    statusEl.className = 'stopped';
    timerEl.textContent = '00:00';
  }

  // Audio
  function playTone() {
    if (muted) return;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = 880;
    gain.gain.value = 0.3;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
  }

  // Camera
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 320, height: 240 } });
  video.srcObject = stream;

  // Model
  const model = await cocoSsd.load();
  loadingEl.style.display = 'none';

  // Detection loop
  async function detect() {
    if (!running) return;
    try {
      const predictions = await model.detect(video);
      const hasPerson = predictions.some(p => p.class === 'person' && p.score > 0.5);
      if (hasPerson) {
        lastSeenTime = Date.now();
        if (!personPresent) personPresent = true;
      } else if (personPresent && Date.now() - lastSeenTime > GRACE_MS) {
        personPresent = false;
      }
    } catch(e) { /* skip frame */ }
    detectTimeout = setTimeout(detect, 1000);
  }

  // Timer tick
  function tick() {
    if (!running) return;
    if (personPresent) {
      if (!isWarning) sittingSec++;
      if (sittingSec >= thresholdSec && !isWarning) {
        isWarning = true;
        document.body.classList.add('warning');
        playTone();
        if (!muted) warnInterval = setInterval(playTone, 3000);
      }
      if (isWarning) {
        statusEl.textContent = 'WARNING — Stand up!';
        statusEl.className = 'warn';
      } else {
        statusEl.textContent = 'Sitting';
        statusEl.className = 'sitting';
      }
    } else {
      if (isWarning) {
        isWarning = false;
        sittingSec = 0;
        document.body.classList.remove('warning');
        if (warnInterval) { clearInterval(warnInterval); warnInterval = null; }
      }
      statusEl.textContent = 'Away';
      statusEl.className = 'away';
    }
    const m = String(Math.floor(sittingSec / 60)).padStart(2, '0');
    const s = String(sittingSec % 60).padStart(2, '0');
    timerEl.textContent = `${m}:${s}`;
  }
})();
</script>
</body>
</html>
